<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blink Detector</title>
   


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        /* MAIN CARD CONTAINER */
        .main-box {
            width: 2000px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px 40px;
            backdrop-filter: blur(6px);
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
        .background-image {
            width: 100%;
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            object-fit: cover;
            object-position: center;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        /* GRID: TIMER | CAMERA | BLINKS */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1.4fr 1fr;
            gap: 20px;
            align-items: center;
        }

        .box {
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-size: 20px;
        }

        .box h3 {
            font-size: 18px;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        /* LIVE FEED STYLING */
        .camera-box img {
            width: 100%;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* BUTTON */
        button {
            background: #764ba2;
            border: none;
            color: white;
            padding: 12px 40px;
            border-radius: 8px;
            margin-top: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        button:hover {
            background: #9b71db;
        }
        

    </style>
</head>

<body>
    <img class="background-image" src="{{ url_for('static', filename='blackBackground.jpg') }}">

    
    <div class="main-box">
       
        <div class="title">Eye Blink Counter</div>

        <div class="grid">

            <!-- TIMER -->
            <div class="box">
                <h3>Timer</h3>
                <div id="time">15 sec</div>
            </div>

            <!-- CAMERA FEED -->
            <div class="camera-box">
                <img src="{{ url_for('video_feed') }}">
            </div>

            <!-- BLINK COUNT -->
            <div class="box">
                <h3>Blinks</h3>
                <div id="blink-count">0 blinks</div>
            </div>

        </div>

        <button onclick="resetCounter()">Reset Counter</button>

    </div>

    <script>
        async function resetCounter() {
            await fetch('/reset');
            document.getElementById('blink-count').textContent = '0 blinks';
        }

        setInterval(async () => {
            const response = await fetch('/blink_count');
            const data = await response.json();
            document.getElementById('blink-count').textContent = data.count + " blinks";
        }, 1000);
    </script>

</body>
</html>
